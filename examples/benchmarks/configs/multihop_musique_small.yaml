# MultiHopRAG Small Benchmark Configuration - 100 docs for quick testing

name: multihop_rag_tiny_gemma26b
version: "1.0"
description: "Quick benchmark on MultiHopRAG with 100 docs testing gemma-4-26b-a4b-it"

dataset:
  name: multihop_rag
  path: ./workdirs/multihop_rag_small/datasets/multihoprag/questions.json
  corpus_path: ./workdirs/multihop_rag_small/datasets/multihoprag/corpus.json
  max_samples: 20  # Only 20 questions
  max_corpus_samples: 100  # Only 100 documents
  auto_download: false

graphrag:
  working_dir: ./workdirs/multihop_rag_tiny_gemma26b
  llm_model: openrouter/google/gemma-4-26b-a4b-it
  llm_cheap_model: openrouter/google/gemma-4-26b-a4b-it
  embedding_model: openrouter/qwen/qwen3-embedding-8b
  embedding_dim: 4096
  enable_local: true
  enable_naive_rag: false
  enable_llm_cache: true
  entity_extraction_quality: balanced
  extraction_max_async: 16

query:
  modes:
    - local
  param_overrides:
    top_k: 30

cache:
  enabled: true
  backend: disk

metrics:
  exact_match: true
  token_f1: true
  llm_judge:
    enabled: false

output:
  results_dir: ./benchmark_results/multihop_rag_tiny_gemma26b
  save_predictions: true
