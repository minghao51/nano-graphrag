# MultiHopRAG Small Benchmark Configuration
# Quick benchmark run with limited corpus

name: multihop_rag_small
version: "1.0"
description: "Quick benchmark on MultiHopRAG with limited samples"

dataset:
  name: multihop_rag
  path: ./workdirs/multihop_rag_small/datasets/multihoprag/questions.json
  corpus_path: ./workdirs/multihop_rag_small/datasets/multihoprag/corpus.json
  max_samples: 50
  auto_download: false

graphrag:
  working_dir: ./workdirs/multihop_rag_small
  llm_model: openrouter/@preset/cheap-fast
  llm_cheap_model: openrouter/@preset/cheap-fast
  embedding_model: openrouter/qwen/qwen3-embedding-8b
  embedding_dim: 4096
  enable_local: true
  enable_naive_rag: false
  enable_llm_cache: true
  entity_extraction_quality: balanced
  extraction_max_async: 16

query:
  modes:
    - local
  param_overrides:
    top_k: 30

cache:
  enabled: true
  backend: disk

metrics:
  exact_match: true
  token_f1: true
  llm_judge:
    enabled: false

output:
  results_dir: ./benchmark_results/multihop_rag_small
  save_predictions: true
