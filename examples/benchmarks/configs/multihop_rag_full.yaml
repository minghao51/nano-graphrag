# Full MultiHopRAG Benchmark Configuration
# Full run on all 2556 training samples

name: multihop_rag_full
version: "1.0"
description: "Full benchmark run on MultiHopRAG training set"

dataset:
  name: multihop_rag
  split: train
  max_samples: -1
  auto_download: true

graphrag:
  working_dir: ./workdirs/multihop_rag_full
  llm_model: openrouter/@preset/cheap-fast
  llm_cheap_model: openrouter/@preset/cheap-fast
  llm_api_base: https://openrouter.ai/api/v1
  embedding_model: openrouter/qwen/qwen3-embedding-8b
  embedding_api_base: https://openrouter.ai/api/v1
  enable_local: true
  enable_naive_rag: false
  enable_llm_cache: true
  entity_extraction_quality: fast
  extraction_max_async: 4

query:
  modes:
    - local
  param_overrides:
    top_k: 30

cache:
  enabled: true
  backend: disk

metrics:
  exact_match: true
  token_f1: true
  llm_judge:
    enabled: false

output:
  results_dir: ./benchmark_results/multihop_rag_full
  save_predictions: true
