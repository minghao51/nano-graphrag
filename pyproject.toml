[project]
name = "nano-graphrag"
version = "0.0.8.2"
description = "A simple, easy-to-hack GraphRAG implementation"
readme = "readme.md"
authors = [{name = "Jianbai Ye"}]
requires-python = ">=3.9"
license = {text = "MIT"}
dependencies = [
    "future>=1.0.0",
    "openai",
    "tiktoken",
    "networkx",
    "graspologic",
    "nano-vectordb",
    "hnswlib",
    "xxhash",
    "tenacity",
    "dspy-ai",
    "neo4j",
    "aioboto3",
    "transformers",
    "litellm>=1.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "python-dotenv",
    "ruff",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py39"
line-length = 100
exclude = ["examples/**", "tests/**"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
