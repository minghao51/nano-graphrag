# MuSiQue Benchmark Configuration

name: musique_benchmark
version: "1.0"
description: "Multi-hop RAG evaluation on MuSiQue dataset"

dataset:
  name: musique
  path: ~/.cache/nano-bench/musique/dev.json
  split: validation
  max_samples: 50
  auto_download: true

graphrag:
  working_dir: ./workdirs/musique
  enable_llm_cache: true

query:
  modes:
    - naive
    - local
    - multihop
  param_overrides:
    max_hops: 4
    entities_per_hop: 10
    context_token_budget: 8000
    top_k: 60

cache:
  enabled: true
  backend: disk

metrics:
  exact_match: true
  token_f1: true

output:
  results_dir: ./results/musique
  save_predictions: true
