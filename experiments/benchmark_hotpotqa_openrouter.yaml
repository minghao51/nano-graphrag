# HotpotQA Benchmark Configuration - OpenRouter
name: hotpotqa_benchmark_openrouter
version: "1.0"
description: "HotpotQA evaluation using OpenRouter (cost-effective)"

dataset:
  name: hotpotqa
  path: ~/.cache/nano-bench/hotpotqa/dev.json
  split: validation
  max_samples: 50
  auto_download: true

graphrag:
  working_dir: ./workdirs/hotpotqa_openrouter
  llm_model: openrouter/anthropic/claude-3.5-sonnet
  embedding_model: openrouter/qwen/qwen3-embedding-8b
  embedding_dim: 4096
  enable_llm_cache: true

query:
  modes:
    - naive
    - local
    - multihop
  param_overrides:
    max_hops: 4
    entities_per_hop: 10
    context_token_budget: 8000
    top_k: 60

cache:
  enabled: true
  backend: disk

metrics:
  exact_match: true
  token_f1: true

output:
  results_dir: ./results/hotpotqa_openrouter
  save_predictions: true
