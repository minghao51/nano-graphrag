name: multihop_full_benchmark
version: "1.0"
description: "Multi-hop RAG benchmark on MultiHop-RAG dataset"

dataset:
  name: multihop_rag
  path: ~/.cache/nano-bench/multihop_rag/questions.json
  corpus_path: ~/.cache/nano-bench/multihop_rag/corpus.json
  split: validation
  max_samples: 200
  auto_download: true

graphrag:
  working_dir: ./workdirs/multihop_benchmark
  llm_model: gpt-4o-mini
  embedding_model: text-embedding-3-small
  chunk_func: chunking_by_token_size
  chunk_token_size: 1200
  chunk_overlap_token_size: 100
  enable_llm_cache: true

query:
  modes:
    - naive
    - local
    - multihop
  param_overrides:
    max_hops: 4
    entities_per_hop: 10
    context_token_budget: 8000

cache:
  enabled: true
  backend: disk

metrics:
  exact_match: true
  token_f1: true

output:
  results_dir: ./results/multihop_benchmark
  save_predictions: true
