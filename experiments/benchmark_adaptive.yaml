# Adaptive Router Benchmark Configuration

name: adaptive_benchmark
version: "1.0"
description: "Adaptive router that automatically selects optimal retrieval mode per query"

dataset:
  name: multihop_rag
  path: ~/.cache/nano-bench/multihop_rag/questions.json
  corpus_path: ~/.cache/nano-bench/multihop_rag/corpus.json
  split: validation
  max_samples: 50
  max_corpus_samples: 500
  auto_download: true

graphrag:
  working_dir: ./workdirs/adaptive
  enable_llm_cache: true
  llm_model: openrouter/@preset/cheap-fast
  embedding_model: openrouter/qwen/qwen3-embedding-8b

query:
  modes:
    - adaptive
  param_overrides:
    # Adaptive router parameters
    multihop_patterns:
      - "\\bwho.*also\\b"
      - "\\bboth.*and\\b"
      - "\\bconnect(?:ion|ed|s)?\\b"
    global_patterns:
      - "\\bthemes?\\b"
      - "\\boverall\\b"
      - "\\bsummariz(?:e|ing)\\b"
    llm_fallback_threshold: 2    # Pattern matches to trigger mode selection
    default_mode: "local"        # Fallback mode if no patterns match
    # Base mode parameters
    max_hops: 4
    entities_per_hop: 10
    context_token_budget: 8000
    top_k: 60

cache:
  enabled: true
  backend: disk

metrics:
  exact_match: true
  token_f1: true

output:
  results_dir: ./results/adaptive
  save_predictions: true
