# RAPTOR Hierarchical Retrieval Benchmark Configuration

name: raptor_benchmark
version: "1.0"
description: "RAPTOR hierarchical clustering and summarization tree retrieval"

dataset:
  name: multihop_rag
  path: ~/.cache/nano-bench/multihop_rag/questions.json
  corpus_path: ~/.cache/nano-bench/multihop_rag/corpus.json
  split: validation
  max_samples: 50
  max_corpus_samples: 500
  auto_download: true

graphrag:
  working_dir: ./workdirs/raptor
  enable_llm_cache: true
  llm_model: openrouter/@preset/cheap-fast
  embedding_model: openrouter/qwen/qwen3-embedding-8b

query:
  modes:
    - raptor
  param_overrides:
    # RAPTOR-specific parameters
    max_tree_levels: 3           # Maximum depth of the hierarchy tree
    cluster_method: "gmm"        # Options: gmm, kmeans
    top_k_cluster: 5             # Number of clusters per level
    summary_token_limit: 500     # Token limit for cluster summaries
    top_k: 60
    context_token_budget: 8000

cache:
  enabled: true
  backend: disk

metrics:
  exact_match: true
  token_f1: true

output:
  results_dir: ./results/raptor
  save_predictions: true
