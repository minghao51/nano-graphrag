# HotpotQA Benchmark Configuration

name: hotpotqa_benchmark
version: "1.0"
description: "Multi-hop RAG evaluation on HotpotQA dataset"

dataset:
  name: hotpotqa
  path: ~/.cache/nano-bench/hotpotqa/dev.json
  split: validation
  max_samples: 50
  auto_download: true

graphrag:
  working_dir: ./workdirs/hotpotqa
  enable_llm_cache: true

query:
  modes:
    - naive
    - local
    - multihop
  param_overrides:
    max_hops: 4
    entities_per_hop: 10
    context_token_budget: 8000
    top_k: 60

cache:
  enabled: true
  backend: disk

metrics:
  exact_match: true
  token_f1: true

output:
  results_dir: ./results/hotpotqa
  save_predictions: true
